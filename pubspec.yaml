name: banco_perla
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8  # Asegúrate de que esta línea solo aparezca una vez
  google_fonts: ^6.1.0
  responsive_framework: ^1.2.0
  flutter_bloc: ^8.1.3
  
# ... (arriba están tus dependencias) ...

# La siguiente línea define configuraciones exclusivas de Flutter
flutter:
  # Ojo: esta línea tiene 2 espacios a la izquierda
  uses-material-design: true

  # Esta línea también tiene 2 espacios
  assets:
    # Y esta línea tiene 4 espacios y un guion
    - assets/images/